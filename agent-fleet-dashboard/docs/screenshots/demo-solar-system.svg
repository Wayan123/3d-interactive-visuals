<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="system-ui,Segoe UI,Roboto,sans-serif">
  <defs>
    <radialGradient id="bg" cx="28%" cy="38%" r="90%">
      <stop offset="0%" stop-color="#0e1424"/><stop offset="60%" stop-color="#0a0e1a"/><stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/><stop offset="45%" stop-color="#ffd24a"/><stop offset="100%" stop-color="#ff8a2a"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8a2a" stop-opacity="0.55"/><stop offset="100%" stop-color="#ff8a2a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="earth" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#5aa9e6"/><stop offset="55%" stop-color="#3a7bd5"/><stop offset="100%" stop-color="#2b5fae"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="1.1"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- starfield -->
  <g fill="#cdd8ff">
    <circle cx="120" cy="80" r="1.4" opacity=".8"/><circle cx="300" cy="140" r="1" opacity=".5"/><circle cx="540" cy="60" r="1.6" opacity=".9"/>
    <circle cx="760" cy="110" r="1" opacity=".5"/><circle cx="980" cy="70" r="1.3" opacity=".7"/><circle cx="1120" cy="150" r="1" opacity=".5"/>
    <circle cx="200" cy="520" r="1.2" opacity=".6"/><circle cx="430" cy="560" r="1" opacity=".5"/><circle cx="700" cy="540" r="1.5" opacity=".8"/>
    <circle cx="900" cy="500" r="1" opacity=".5"/><circle cx="1080" cy="560" r="1.3" opacity=".7"/><circle cx="60" cy="300" r="1" opacity=".5"/>
    <circle cx="1150" cy="330" r="1.2" opacity=".6"/><circle cx="380" cy="300" r="1" opacity=".4"/>
  </g>

  <!-- title -->
  <text x="60" y="64" fill="#e9eefc" font-size="30" font-weight="700">Scale Explorer — Solar System</text>
  <text x="60" y="92" fill="#7f8db0" font-size="16">Sun · 8 planets · the Moon — 100% procedural Three.js · atom → galaxy</text>

  <!-- Sun at left -->
  <circle cx="150" cy="350" r="160" fill="url(#sunGlow)"/>
  <circle cx="150" cy="350" r="92" fill="url(#sun)"/>
  <text x="150" y="470" fill="#ffd24a" font-size="15" text-anchor="middle">Sun</text>

  <!-- orbits + planets along a sweep to the right -->
  <g fill="none" stroke="#2a3550" stroke-width="1" opacity="0.7">
    <ellipse cx="150" cy="350" rx="270" ry="150"/>
    <ellipse cx="150" cy="350" rx="350" ry="190"/>
    <ellipse cx="150" cy="350" rx="430" ry="232"/>
    <ellipse cx="150" cy="350" rx="510" ry="272"/>
    <ellipse cx="150" cy="350" rx="600" ry="318"/>
    <ellipse cx="150" cy="350" rx="700" ry="368"/>
    <ellipse cx="150" cy="350" rx="800" ry="416"/>
    <ellipse cx="150" cy="350" rx="900" ry="462"/>
  </g>

  <!-- planets (radius scaled, real-ish colors) -->
  <g font-size="12" text-anchor="middle">
    <circle cx="420" cy="350" r="7"  fill="#9c948c"/><text x="420" y="332" fill="#9aa6c4">Mercury</text>
    <circle cx="500" cy="350" r="11" fill="#e6c88a"/><text x="500" y="326" fill="#9aa6c4">Venus</text>
    <g><circle cx="580" cy="350" r="12" fill="url(#earth)"/><circle cx="600" cy="334" r="4" fill="#cfcfcf"/><text x="580" y="324" fill="#9aa6c4">Earth · Moon</text></g>
    <circle cx="660" cy="350" r="9"  fill="#e0734a"/><text x="660" y="330" fill="#9aa6c4">Mars</text>
    <circle cx="750" cy="350" r="26" fill="#d9a066"/><ellipse cx="755" cy="346" rx="9" ry="4" fill="#c0492f" opacity=".8"/><text x="750" y="314" fill="#9aa6c4">Jupiter</text>
    <!-- Saturn with rings -->
    <g transform="translate(850 350)"><ellipse cx="0" cy="0" rx="40" ry="12" fill="none" stroke="#d8c9a0" stroke-width="5" opacity=".75"/><circle cx="0" cy="0" r="22" fill="#e8d39a"/><text x="0" y="-30" fill="#9aa6c4">Saturn</text></g>
    <circle cx="950" cy="350" r="17" fill="#8fe3e0"/><text x="950" y="324" fill="#9aa6c4">Uranus</text>
    <circle cx="1050" cy="350" r="16" fill="#4060d0"/><text x="1056" fill="#9aa6c4">Neptune</text>
  </g>

  <text x="1140" y="600" fill="#55617f" font-size="13" text-anchor="end">Educational, not to scale · Scale Explorer v0.8</text>
</svg>

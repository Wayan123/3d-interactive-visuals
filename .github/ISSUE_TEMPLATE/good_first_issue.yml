name: Good first issue
description: A scoped task suitable for first-time contributors.
title: "Good first issue: "
labels: [good first issue, help wanted]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What needs to be changed?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Suggested files
      placeholder: |
        - agent-fleet-dashboard/data/cells.json
        - agent-fleet-dashboard/assets/bio/geometry.js
  - type: textarea
    id: done
    attributes:
      label: Done when
      placeholder: |
        - New specimen appears in Gallery and Search
        - python3 scripts/validate_project.py passes
    validations:
      required: true
